version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vocal-calendar-db
    environment:
      POSTGRES_USER: vocal_user
      POSTGRES_PASSWORD: vocal_pass
      POSTGRES_DB: vocal_calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocal_user -d vocal_calendar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vocal-calendar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
